services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cqrs-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  product-api:
    build:
      context: .
      dockerfile: src/Product/Product.Api/Dockerfile
    container_name: product-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ProductDb: "Server=sqlserver;Database=ProductDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver

  user-api:
    build:
      context: .
      dockerfile: src/User/User.Api/Dockerfile
    container_name: user-api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UserDb: "Server=sqlserver;Database=UserDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver

  order-api:
    build:
      context: .
      dockerfile: src/Order/Order.Api/Dockerfile
    container_name: order-api
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrderDb: "Server=sqlserver;Database=OrderDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      Services__ProductService: "http://product-api:8080"
      Services__UserService: "http://user-api:8080"
    depends_on:
      - sqlserver
      - product-api
      - user-api

volumes:
  sqlserver-data:
